<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Diagnostic</title>

<style>
body{
    background:#000;
    color:#00ff55;
    font-family:Consolas, monospace;
    margin:0;
    padding:30px;
}

#terminal{
    max-width:900px;
    margin:auto;
    white-space:pre-wrap;
    line-height:1.5;
    font-size:20px;
}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>

const lines = [
"Connecting to device...",
"",
"Running system diagnostics...",
"Checking internet connection... OK",
"Checking camera... OK",
"Checking microphone... OK",
"",
"Attempting admin login...",
"Username: admin",
"Password: *******",
"sudo user accepted",
"",
"Opening remote terminal between 72.14.204.103 and 42.17.125.09",
"████████████████████ 100%",
"Connected",
"Loading remote access service...",
"████████████████████ 100%",
"",
"Congratulations! Josh now has access to your camera and microphone!",
"",
"Have a great day!"
];

const terminal = document.getElementById("terminal");

let i = 0;

function typeLine(){
    if(i >= lines.length){
        terminal.innerHTML += "\n<span class='cursor'>█</span>";
        return;
    }

    terminal.innerHTML += lines[i] + "\n";
    terminal.scrollTop = terminal.scrollHeight;
    i++;

    setTimeout(typeLine, 700);
}

typeLine();

</script>

</body>
</html>
